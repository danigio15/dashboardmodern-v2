name: Validate with hassfest

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Run hassfest
        shell: bash
        run: |
          set +e
          docker run --rm -v "${GITHUB_WORKSPACE}:/github/workspace" ghcr.io/home-assistant/hassfest > /tmp/hassfest.log 2>&1
          status=$?
          cat /tmp/hassfest.log
          exit "$status"
